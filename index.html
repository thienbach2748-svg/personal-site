<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>符政杰 Owen — 销售管理 / GTM</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --orange: #FF6B2C;
  --orange-deep: #E85D04;
  --yellow: #FFB800;
  --yellow-light: #FFD23F;
  --green: #1EA678;
  --green-light: #2ECB8B;
  --coral: #FF5E62;
  --bg: #FFF8F0;
  --dark: #2D1B00;
  --card: #FFFFFF;
  --shadow: 0 4px 24px rgba(255,107,44,0.12);
  --shadow-hover: 0 12px 36px rgba(255,107,44,0.18);
  --radius: 16px;
}

html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--dark);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== Typography ===== */
h1 { font-size: clamp(2.4rem, 5vw, 4rem); font-weight: 800; letter-spacing: -0.02em; }
h2 { font-size: clamp(1.8rem, 3.5vw, 2.4rem); font-weight: 700; }
h3 { font-size: 1.25rem; font-weight: 600; }

.section-title {
  text-align: center;
  margin-bottom: 3rem;
}
.section-title h2 { display: inline-block; position: relative; }
.section-title h2::after {
  content: '';
  position: absolute;
  left: 50%; bottom: -8px;
  transform: translateX(-50%);
  width: 60%;
  height: 4px;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--orange), var(--yellow), var(--green));
}

/* ===== Navbar ===== */
.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  padding: 1rem 2rem;
  background: rgba(255,248,240,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,107,44,0.1);
  display: flex; justify-content: space-between; align-items: center;
  transition: box-shadow 0.3s;
}
.navbar.scrolled { box-shadow: 0 2px 20px rgba(255,107,44,0.15); }

.nav-logo {
  font-size: 1.4rem; font-weight: 800;
  background: linear-gradient(135deg, var(--orange), var(--coral));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-links a {
  text-decoration: none; color: var(--dark); font-weight: 500;
  position: relative; transition: color 0.3s;
}
.nav-links a::after {
  content: '';
  position: absolute; left: 0; bottom: -4px;
  width: 0; height: 3px; border-radius: 2px;
  background: var(--green);
  transition: width 0.3s;
}
.nav-links a:hover { color: var(--orange); }
.nav-links a:hover::after { width: 100%; }

.nav-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
.nav-toggle span { display: block; width: 24px; height: 3px; border-radius: 2px; background: var(--dark); transition: 0.3s; }

/* ===== Hero ===== */
.hero {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  position: relative;
  background: linear-gradient(135deg, #FFF3E0 0%, #FFECD2 30%, #FFF8E1 60%, #F1F8E9 100%);
  padding: 6rem 2rem 4rem;
}
.hero::before {
  content: '';
  position: absolute; top: -200px; right: -100px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(255,107,44,0.15) 0%, transparent 70%);
  border-radius: 50%;
  animation: float 8s ease-in-out infinite;
}
.hero::after {
  content: '';
  position: absolute; bottom: -100px; left: -50px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(30,166,120,0.12) 0%, transparent 70%);
  border-radius: 50%;
  animation: float 10s ease-in-out infinite reverse;
}

@keyframes float {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-30px) scale(1.05); }
}

.hero-content { position: relative; z-index: 1; text-align: center; max-width: 720px; }

.hero-tag {
  display: inline-block; padding: 6px 20px;
  background: linear-gradient(135deg, var(--orange), var(--coral));
  color: #fff; border-radius: 50px; font-size: 0.9rem; font-weight: 600;
  margin-bottom: 1.5rem; letter-spacing: 0.05em;
  animation: pulse-tag 2s ease-in-out infinite;
}
@keyframes pulse-tag {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,44,0.4); }
  50% { box-shadow: 0 0 0 16px rgba(255,107,44,0); }
}

.hero h1 { margin-bottom: 1rem; }
.hero h1 .hl { background: linear-gradient(135deg, var(--orange), var(--coral)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

.hero-subtitle {
  font-size: clamp(1rem, 2vw, 1.25rem); color: #6B4E30;
  margin-bottom: 2.5rem; min-height: 2em;
}
.hero-subtitle .cursor {
  display: inline-block; width: 3px; height: 1.2em;
  background: var(--green);
  margin-left: 2px; vertical-align: text-bottom;
  animation: blink 0.8s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

.hero-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }

.btn {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 14px 32px; border-radius: 50px;
  font-size: 1rem; font-weight: 600; text-decoration: none;
  cursor: pointer; border: none;
  transition: transform 0.3s, box-shadow 0.3s;
}
.btn:hover { transform: translateY(-3px); }

.btn-primary {
  background: linear-gradient(135deg, var(--orange), var(--coral));
  color: #fff; box-shadow: 0 6px 24px rgba(255,107,44,0.35);
}
.btn-primary:hover { box-shadow: 0 10px 32px rgba(255,107,44,0.5); }

.btn-outline {
  background: transparent; color: var(--orange);
  border: 2px solid var(--orange);
}
.btn-outline:hover { background: var(--orange); color: #fff; }

/* ===== Floating Shapes ===== */
.shapes { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
.shape {
  position: absolute; border-radius: 50%;
  opacity: 0.5;
}
.shape-1 { top: 15%; left: 8%; width: 40px; height: 40px; background: var(--yellow); animation: float 5s ease-in-out infinite; }
.shape-2 { top: 60%; left: 12%; width: 25px; height: 25px; background: var(--green); animation: float 7s ease-in-out 1s infinite; }
.shape-3 { top: 20%; right: 10%; width: 35px; height: 35px; background: var(--coral); animation: float 6s ease-in-out 2s infinite; border-radius: 8px; }
.shape-4 { top: 70%; right: 8%; width: 30px; height: 30px; background: var(--orange); animation: float 8s ease-in-out 0.5s infinite; border-radius: 6px; transform: rotate(45deg); }
.shape-5 { top: 40%; left: 50%; width: 20px; height: 20px; background: var(--yellow-light); animation: float 4s ease-in-out 1.5s infinite; }

/* ===== About ===== */
.about { padding: 6rem 2rem; max-width: 960px; margin: 0 auto; }
.about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
.about-card {
  background: var(--card); border-radius: var(--radius);
  padding: 2rem; box-shadow: var(--shadow);
  border-top: 4px solid transparent;
  transition: transform 0.3s, box-shadow 0.3s;
}
.about-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-hover); }
.about-card:nth-child(1) { border-top-color: var(--orange); }
.about-card:nth-child(2) { border-top-color: var(--green); }
.about-card .icon {
  width: 52px; height: 52px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; margin-bottom: 1rem;
}
.about-card:nth-child(1) .icon { background: rgba(255,107,44,0.12); color: var(--orange); }
.about-card:nth-child(2) .icon { background: rgba(30,166,120,0.12); color: var(--green); }
.about-card h3 { margin-bottom: 0.75rem; }
.about-card p { color: #6B4E30; font-size: 0.95rem; }

/* ===== Skills ===== */
.skills { padding: 6rem 2rem; background: linear-gradient(180deg, #FFF8F0 0%, #FFF 50%, #FFF8F0 100%); }
.skills-container { max-width: 900px; margin: 0 auto; }
.skill-category { margin-bottom: 2.5rem; }
.skill-category h3 {
  display: flex; align-items: center; gap: 0.5rem;
  margin-bottom: 1.25rem; font-size: 1.15rem;
}
.skill-category .dot {
  width: 12px; height: 12px; border-radius: 50%; display: inline-block;
}
.dot-orange { background: var(--orange); }
.dot-green { background: var(--green); }
.tags { display: flex; flex-wrap: wrap; gap: 0.75rem; }
.tag {
  padding: 8px 18px; border-radius: 50px;
  font-size: 0.9rem; font-weight: 600;
  background: var(--card); box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  transition: transform 0.3s, box-shadow 0.3s, color 0.3s;
}
.tag:hover { transform: translateY(-3px) scale(1.05); }
.tag-orange { border: 2px solid rgba(255,107,44,0.3); color: var(--orange); }
.tag-orange:hover { background: var(--orange); color: #fff; box-shadow: 0 4px 16px rgba(255,107,44,0.3); }
.tag-green { border: 2px solid rgba(30,166,120,0.3); color: var(--green); }
.tag-green:hover { background: var(--green); color: #fff; box-shadow: 0 4px 16px rgba(30,166,120,0.3); }

/* ===== Projects ===== */
.projects { padding: 6rem 2rem; max-width: 1080px; margin: 0 auto; }
.project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
.project-card {
  background: var(--card); border-radius: var(--radius);
  overflow: hidden; box-shadow: var(--shadow);
  transition: transform 0.3s, box-shadow 0.3s;
  position: relative;
}
.project-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-hover); }
.project-card .card-top {
  height: 8px;
  background: linear-gradient(90deg, var(--orange), var(--yellow), var(--green));
}
.project-card .card-body { padding: 1.75rem; }
.project-card h3 { margin-bottom: 0.5rem; }
.project-card p { color: #6B4E30; font-size: 0.92rem; margin-bottom: 1rem; }
.project-card .project-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.project-card .project-tags span {
  padding: 4px 12px; border-radius: 50px;
  font-size: 0.78rem; font-weight: 600;
  background: rgba(255,107,44,0.08); color: var(--orange);
}

/* ===== Contact ===== */
.contact { padding: 6rem 2rem; background: linear-gradient(135deg, #FFF3E0, #F1F8E9); }
.contact-inner { max-width: 700px; margin: 0 auto; text-align: center; }
.contact-links { display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; margin: 2.5rem 0; }
.contact-link {
  display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
  text-decoration: none; color: var(--dark); font-weight: 500;
  transition: transform 0.3s;
}
.contact-link:hover { transform: translateY(-6px); }
.contact-link .link-icon {
  width: 56px; height: 56px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; transition: box-shadow 0.3s;
}
.contact-link:nth-child(1) .link-icon { background: rgba(255,107,44,0.12); color: var(--orange); }
.contact-link:nth-child(2) .link-icon { background: rgba(30,166,120,0.12); color: var(--green); }
.contact-link:nth-child(3) .link-icon { background: rgba(255,184,0,0.12); color: var(--yellow); }
.contact-link:hover .link-icon { box-shadow: 0 8px 24px rgba(0,0,0,0.12); }

/* ===== Footer ===== */
.footer {
  padding: 2rem; text-align: center;
  background: var(--dark); color: rgba(255,255,255,0.7);
  font-size: 0.9rem;
}

.back-to-top {
  display: inline-flex; align-items: center; justify-content: center;
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, var(--orange), var(--coral));
  color: #fff; font-size: 1.2rem; text-decoration: none;
  position: fixed; bottom: 28px; right: 28px; z-index: 999;
  box-shadow: 0 4px 16px rgba(255,107,44,0.35);
  transition: transform 0.3s, opacity 0.3s;
  opacity: 0; pointer-events: none;
}
.back-to-top.show { opacity: 1; pointer-events: auto; }
.back-to-top:hover { transform: translateY(-4px); }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .nav-links { display: none; }
  .nav-links.open {
    display: flex; flex-direction: column; gap: 1rem;
    position: absolute; top: 100%; left: 0; right: 0;
    background: rgba(255,248,240,0.98); backdrop-filter: blur(12px);
    padding: 1.5rem 2rem; border-bottom: 1px solid rgba(255,107,44,0.1);
  }
  .nav-toggle { display: flex; }
  .about-grid { grid-template-columns: 1fr; }
  .hero { padding: 5rem 1.5rem 3rem; }
  .contact-links { gap: 1.5rem; }
}
@media (max-width: 480px) {
  .hero-btns { flex-direction: column; align-items: center; }
  .btn { width: 100%; justify-content: center; }
  .project-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar" id="navbar">
  <span class="nav-logo">Owen</span>
  <button class="nav-toggle" id="navToggle" aria-label="菜单">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links" id="navLinks">
    <li><a href="#home">首页</a></li>
    <li><a href="#about">关于</a></li>
    <li><a href="#skills">技能</a></li>
    <li><a href="#projects">项目</a></li>
    <li><a href="#contact">联系</a></li>
  </ul>
</nav>

<!-- Hero (dynamic) -->
<section class="hero" id="home">
  <div class="shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
    <div class="shape shape-5"></div>
  </div>
  <div class="hero-content" id="heroContent"></div>
</section>

<!-- About (dynamic) -->
<section class="about" id="about"></section>

<!-- Skills (dynamic) -->
<section class="skills" id="skills"></section>

<!-- Projects (dynamic) -->
<section class="projects" id="projects"></section>

<!-- Contact (dynamic) -->
<section class="contact" id="contact"></section>

<!-- Footer -->
<footer class="footer">
  <p>&copy; 2026 符政杰 Owen. Built with &hearts; </p>
</footer>

<a href="#home" class="back-to-top" id="backTop" title="回到顶部">&uarr;</a>

<script>
// ===== Data Loader =====
async function loadJSON(path) {
  const res = await fetch(path);
  return res.json();
}

// ===== Build Hero =====
function buildHero(data) {
  const el = document.getElementById('heroContent');
  el.innerHTML = `
    <span class="hero-tag">${data.tag}</span>
    <h1>我是 <span class="hl">${data.name}</span></h1>
    <p class="hero-subtitle"><span id="typewriter"></span><span class="cursor"></span></p>
    <div class="hero-btns">
      <a href="#projects" class="btn btn-primary">${data.btn1Text}</a>
      <a href="#contact" class="btn btn-outline">${data.btn2Text}</a>
    </div>`;
  startTypewriter(data.phrases);
}

// ===== Build About =====
function buildAbout(data) {
  const el = document.getElementById('about');
  el.innerHTML = `<div class="section-title"><h2>${data.title}</h2></div>
    <div class="about-grid">
      ${data.cards.map(c => `
        <div class="about-card">
          <div class="icon">${c.icon}</div>
          <h3>${c.title}</h3>
          <p>${c.text}</p>
        </div>`).join('')}
    </div>`;
}

// ===== Build Skills =====
function buildSkills(data) {
  const el = document.getElementById('skills');
  el.innerHTML = `<div class="section-title"><h2>${data.title}</h2></div>
    <div class="skills-container">
      ${data.categories.map(c => `
        <div class="skill-category">
          <h3><span class="dot dot-${c.color}"></span> ${c.name}</h3>
          <div class="tags">
            ${c.tags.map(t => `<span class="tag tag-${c.color}">${t}</span>`).join('')}
          </div>
        </div>`).join('')}
    </div>`;
}

// ===== Build Projects =====
function buildProjects(data) {
  const el = document.getElementById('projects');
  el.innerHTML = `<div class="section-title"><h2>${data.title}</h2></div>
    <div class="project-grid">
      ${data.items.map(p => `
        <div class="project-card">
          <div class="card-top"></div>
          <div class="card-body">
            <h3>${p.title}</h3>
            <p>${p.text}</p>
            <div class="project-tags">
              ${p.tags.map(t => `<span>${t}</span>`).join('')}
            </div>
          </div>
        </div>`).join('')}
    </div>`;
}

// ===== Build Contact =====
function buildContact(data) {
  const el = document.getElementById('contact');
  el.innerHTML = `<div class="section-title"><h2>${data.title}</h2></div>
    <div class="contact-inner">
      <p style="color:#6B4E30;font-size:1.1rem;">${data.subtitle}</p>
      <div class="contact-links">
        ${data.links.map(l => `
          <a href="${l.url}" class="contact-link">
            <span class="link-icon">${l.icon}</span>
            <span>${l.text}</span>
          </a>`).join('')}
      </div>
    </div>`;
}

// ===== Typewriter =====
function startTypewriter(phrases) {
  let phraseIdx = 0, charIdx = 0, isDeleting = false;
  const el = document.getElementById('typewriter');
  if (!el) return;
  function type() {
    const current = phrases[phraseIdx];
    const speed = isDeleting ? 40 : 80;
    if (!isDeleting && charIdx <= current.length) {
      el.textContent = current.slice(0, charIdx);
      charIdx++;
    } else if (isDeleting && charIdx >= 0) {
      el.textContent = current.slice(0, charIdx);
      charIdx--;
    }
    if (charIdx > current.length) { isDeleting = true; setTimeout(type, 1500); return; }
    if (charIdx < 0) { isDeleting = false; phraseIdx = (phraseIdx + 1) % phrases.length; }
    setTimeout(type, speed);
  }
  type();
}

// ===== Init =====
async function init() {
  const [hero, about, skills, projects, contact] = await Promise.all([
    loadJSON('content/hero.json'),
    loadJSON('content/about.json'),
    loadJSON('content/skills.json'),
    loadJSON('content/projects.json'),
    loadJSON('content/contact.json')
  ]);
  buildHero(hero);
  buildAbout(about);
  buildSkills(skills);
  buildProjects(projects);
  buildContact(contact);
}

init();

// ===== Scroll & Nav =====
window.addEventListener('scroll', () => {
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
  document.getElementById('backTop').classList.toggle('show', window.scrollY > 600);
});

document.getElementById('navToggle').addEventListener('click', () => {
  document.getElementById('navLinks').classList.toggle('open');
});

document.querySelectorAll('#navLinks a').forEach(link => {
  link.addEventListener('click', () => document.getElementById('navLinks').classList.remove('open'));
});
</script>
</body>
</html>
