<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>内容管理 - 后台</title>
  <style>
    body { font-family: sans-serif; background: #FFF8F0; margin: 0; }
    #loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: #FF6B2C; font-size: 1.2rem; flex-direction: column; gap: 1rem; }
    .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #FF6B2C; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>正在加载内容管理系统…</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.12.2/dist/decap-cms.js"></script>
</body>
</html>
